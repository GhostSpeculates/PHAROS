# ============================================
# PHAROS — Default Configuration
# ============================================
# This is the default routing config. Copy to pharos.yaml to customize.

server:
  port: 3777
  host: "127.0.0.1"
  # Max request body size in megabytes
  bodyLimitMb: 10
  # Max requests per minute per IP (rate limiting)
  rateLimitPerMinute: 100
  # Max requests per minute per agent (extracted from model field, e.g. pharos-auto:agent-name)
  agentRateLimitPerMinute: 30
  # Run a quick self-test on startup to verify providers respond
  selfTest: true
  # Enable debug logging (stores first 500 chars of input/output in tracking DB)
  debugLogging: false

# Your Pharos API key — clients must send this to authenticate
# Can also be set via PHAROS_API_KEY env var
auth:
  apiKey: ""

# Router settings
router:
  # Token count above which pre-flight context window filtering kicks in
  oversizedThresholdTokens: 100000

# The model used to classify query complexity
# Supports any OpenAI-compatible provider (groq, xai, deepseek, openai, etc.)
classifier:
  # Classifier providers tried in order (failover chain)
  # Moonshot is primary — separates classifier token budget from Groq's routing budget
  providers:
    - provider: moonshot
      model: kimi-latest
    - provider: groq
      model: llama-3.3-70b-versatile
  # Fallback tier if ALL classifier providers fail
  # "economical" is safest: under-classify (cheap) rather than over-classify (expensive)
  fallbackTier: economical
  # Max time to wait for classification per provider (ms)
  timeoutMs: 3000
  # Max concurrent classifier calls (prevents overwhelming classifier providers under burst)
  maxConcurrent: 5
  # Short-TTL cache for deduplicating identical queries under burst load
  cacheMaxSize: 100
  cacheTtlMs: 30000

# Routing tiers — score ranges map to model pools
tiers:
  free:
    scoreRange: [1, 3]
    models:
      - provider: groq
        model: llama-3.3-70b-versatile
      - provider: google
        model: gemini-2.5-flash
      - provider: together
        model: meta-llama/Llama-3.3-70B-Instruct-Turbo
      - provider: fireworks
        model: accounts/fireworks/models/llama-v3p3-70b-instruct

  economical:
    scoreRange: [4, 6]
    models:
      - provider: groq
        model: llama-3.3-70b-versatile
      - provider: moonshot
        model: kimi-latest
      - provider: deepseek
        model: deepseek-chat
      - provider: together
        model: deepseek-ai/DeepSeek-V3
      - provider: together
        model: Qwen/Qwen2.5-72B-Instruct-Turbo
      - provider: fireworks
        model: accounts/fireworks/models/deepseek-v3
      - provider: openai
        model: gpt-4o
      - provider: mistral
        model: mistral-large-latest

  premium:
    scoreRange: [7, 8]
    models:
      - provider: anthropic
        model: claude-sonnet-4-20250514
      - provider: openai
        model: gpt-4o
      - provider: google
        model: gemini-2.5-pro
      - provider: deepseek
        model: deepseek-reasoner

  frontier:
    scoreRange: [9, 10]
    models:
      - provider: anthropic
        model: claude-opus-4-20250514
      - provider: anthropic
        model: claude-sonnet-4-20250514
      - provider: openai
        model: gpt-4o
      - provider: openai
        model: o3

# Provider configurations — API keys loaded from env vars
providers:
  anthropic:
    apiKeyEnv: ANTHROPIC_API_KEY
    timeoutMs: 30000
    healthCooldownMs: 60000
  google:
    apiKeyEnv: GOOGLE_AI_API_KEY
    timeoutMs: 30000
    healthCooldownMs: 60000
  openai:
    apiKeyEnv: OPENAI_API_KEY
    baseUrl: https://api.openai.com/v1
    timeoutMs: 30000
    healthCooldownMs: 60000
  deepseek:
    apiKeyEnv: DEEPSEEK_API_KEY
    baseUrl: https://api.deepseek.com/v1
    timeoutMs: 30000
    healthCooldownMs: 60000
  groq:
    apiKeyEnv: GROQ_API_KEY
    baseUrl: https://api.groq.com/openai/v1
    timeoutMs: 30000
    healthCooldownMs: 60000
  mistral:
    apiKeyEnv: MISTRAL_API_KEY
    baseUrl: https://api.mistral.ai/v1
    timeoutMs: 30000
    healthCooldownMs: 60000
  moonshot:
    apiKeyEnv: MOONSHOT_API_KEY
    baseUrl: https://api.moonshot.ai/v1
    timeoutMs: 30000
    healthCooldownMs: 60000
  together:
    apiKeyEnv: TOGETHER_API_KEY
    baseUrl: https://api.together.xyz/v1
    timeoutMs: 30000
    healthCooldownMs: 60000
  fireworks:
    apiKeyEnv: FIREWORKS_API_KEY
    baseUrl: https://api.fireworks.ai/inference/v1
    timeoutMs: 30000
    healthCooldownMs: 60000

# Model pricing — cost per million tokens (input/output)
# These override the hardcoded defaults in the cost calculator
#
# Free tier models: Groq and Google Gemini Flash are priced at $0 because
# their free API tiers cover Pharos usage at typical volumes.
# Groq is routing-only (classifier moved to Moonshot), so free tier lasts longer.
# Groq paid rate: $0.59/$0.79, Google paid rate: $0.30/$2.50 (standard API)
# If you exceed free tier limits, update these entries to reflect actual costs.
pricing:
  # ─── Free Tier ───
  - provider: google
    model: gemini-2.5-flash
    inputCostPerMillion: 0
    outputCostPerMillion: 0
  - provider: groq
    model: llama-3.3-70b-versatile
    inputCostPerMillion: 0
    outputCostPerMillion: 0
  # ─── Economical Tier ───
  - provider: deepseek
    model: deepseek-chat
    inputCostPerMillion: 0.14
    outputCostPerMillion: 0.28
  - provider: mistral
    model: mistral-large-latest
    inputCostPerMillion: 2.0
    outputCostPerMillion: 6.0
  # ─── Premium Tier ───
  - provider: anthropic
    model: claude-sonnet-4-20250514
    inputCostPerMillion: 3.0
    outputCostPerMillion: 15.0
  - provider: openai
    model: gpt-4o
    inputCostPerMillion: 2.5
    outputCostPerMillion: 10.0
  - provider: google
    model: gemini-2.5-pro
    inputCostPerMillion: 1.25
    outputCostPerMillion: 10.0
  # ─── Frontier Tier ───
  - provider: anthropic
    model: claude-opus-4-20250514
    inputCostPerMillion: 15.0
    outputCostPerMillion: 75.0
  - provider: openai
    model: o3
    inputCostPerMillion: 10.0
    outputCostPerMillion: 40.0
  # ─── Classifier (primary) / Economical ───
  - provider: moonshot
    model: kimi-latest
    inputCostPerMillion: 0.50
    outputCostPerMillion: 2.50
  - provider: xai
    model: grok-3-mini-fast
    inputCostPerMillion: 0.30
    outputCostPerMillion: 0.50
  - provider: deepseek
    model: deepseek-reasoner
    inputCostPerMillion: 0.55
    outputCostPerMillion: 2.19
  # ─── Together AI ───
  - provider: together
    model: meta-llama/Llama-3.3-70B-Instruct-Turbo
    inputCostPerMillion: 0.88
    outputCostPerMillion: 0.88
  - provider: together
    model: deepseek-ai/DeepSeek-V3
    inputCostPerMillion: 0.50
    outputCostPerMillion: 0.90
  - provider: together
    model: Qwen/Qwen2.5-72B-Instruct-Turbo
    inputCostPerMillion: 0.60
    outputCostPerMillion: 0.60
  # ─── Fireworks AI ───
  - provider: fireworks
    model: accounts/fireworks/models/llama-v3p3-70b-instruct
    inputCostPerMillion: 0.90
    outputCostPerMillion: 0.90
  - provider: fireworks
    model: accounts/fireworks/models/deepseek-v3
    inputCostPerMillion: 0.50
    outputCostPerMillion: 1.40

# Task-type affinity — preferred providers per task type
# When the classifier identifies a task type, models from preferred
# providers are tried first within each tier. Providers not listed
# keep their original config order as fallback.
taskAffinity:
  code: [deepseek, together, fireworks, anthropic]
  math: [together, openai, anthropic, deepseek]
  reasoning: [anthropic, deepseek, openai]
  creative: [anthropic, google, openai]
  conversation: [groq, together, fireworks, google]
  analysis: [deepseek, together, anthropic, openai]
  planning: [anthropic, openai, deepseek]

# Agent profiles — per-agent score clamping and tier guards
# Available fields per agent:
#   description: string   — hint passed to classifier for better initial scoring
#   scoreFloor: 1-10      — minimum classification score
#   scoreCeiling: 1-10    — maximum classification score
#   minTier: free|economical|premium|frontier — never route below this tier
#   maxTier: free|economical|premium|frontier — never route above this tier
#
# Agents are identified from the model field: "pharos-auto:agent-name" → agentId = "agent-name"
# Edit this section to tune routing per agent. Changes take effect on next request (no restart needed if using pharos.yaml override).
agents:
  # ─── Orchestrator — needs premium+ for reliable tool_use delegation ───
  noir:
    description: "Primary orchestrator agent — delegates tasks to sub-agents via tool calls"
    minTier: premium
  # ─── Core agents — classifier decides freely ───
  essence:
    description: "Core personality and conversational agent"
  nexus:
    description: "Connection and integration agent"
  edge:
    description: "Fast-response edge processing agent"
  sentinel:
    description: "Monitoring and security agent"
  lens:
    description: "Analysis and observation agent"
  vault:
    description: "Data storage and retrieval agent"

# Prompt enhancement — makes cheap models smarter with task-type hints
# Only activates for free/economical tiers (premium/frontier don't need it)
promptEnhancement:
  enabled: true
  excludeTiers: [premium, frontier]
  # Override default hints per task type (leave empty to use built-in defaults)
  hints: {}

# Spending limits — set to null (or omit) to disable
# Alerts fire at 80% and 100% of each limit
spending:
  dailyLimit: null
  monthlyLimit: null

# Conversation-aware routing — prevents quality drops in multi-turn conversations
# When a premium model is used, follow-up messages get a tier floor (one below peak)
conversation:
  enabled: true
  maxConversations: 500
  conversationTtlMs: 1800000

# Performance learning — adaptive routing based on observed success/failure/latency
# Models that perform well for a task type get tried first (within tier boundaries)
performanceLearning:
  enabled: true
  # Minimum samples before weight deviates significantly from 1.0
  minConfidenceSamples: 10
  # Decay factor applied to counts on each startup (0.85 = ~45% after 5 restarts)
  decayFactor: 0.85
  # Weight bounds (0.3 = strong demotion, 2.0 = strong promotion)
  maxWeight: 2.0
  minWeight: 0.3

# Cost tracking
tracking:
  enabled: true
  # Where to store the SQLite database
  dbPath: ./data/pharos.db
  # Baseline model for savings calculation
  baselineModel: claude-sonnet-4-20250514
  baselineCostPerMillionInput: 3.0
  baselineCostPerMillionOutput: 15.0
  # Purge tracking records older than this many days on startup
  retentionDays: 30

logging:
  level: info
  pretty: true
