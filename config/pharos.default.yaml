# ============================================
# PHAROS — Default Configuration
# ============================================
# This is the default routing config. Copy to pharos.yaml to customize.

server:
  port: 3777
  host: "127.0.0.1"
  # Max request body size in megabytes
  bodyLimitMb: 10
  # Max requests per minute per IP (rate limiting)
  rateLimitPerMinute: 100
  # Max requests per minute per agent (extracted from model field, e.g. pharos-auto:agent-name)
  agentRateLimitPerMinute: 30
  # Run a quick self-test on startup to verify providers respond
  selfTest: true
  # Enable debug logging (stores first 500 chars of input/output in tracking DB)
  debugLogging: false

# Your Pharos API key — clients must send this to authenticate
# Can also be set via PHAROS_API_KEY env var
auth:
  apiKey: ""

# Router settings
router:
  # Token count above which pre-flight context window filtering kicks in
  oversizedThresholdTokens: 100000

# The model used to classify query complexity
# Supports any OpenAI-compatible provider (groq, xai, deepseek, openai, etc.)
classifier:
  # Classifier providers tried in order (failover chain)
  # Moonshot is primary — separates classifier token budget from Groq's routing budget
  providers:
    - provider: moonshot
      model: kimi-latest
    - provider: groq
      model: llama-3.3-70b-versatile
    - provider: xai
      model: grok-3-mini-fast
  # Fallback tier if ALL classifier providers fail
  # "economical" is safest: under-classify (cheap) rather than over-classify (expensive)
  fallbackTier: economical
  # Max time to wait for classification per provider (ms)
  timeoutMs: 3000
  # Max concurrent classifier calls (prevents overwhelming classifier providers under burst)
  maxConcurrent: 5
  # Short-TTL cache for deduplicating identical queries under burst load
  cacheMaxSize: 100
  cacheTtlMs: 30000

# Routing tiers — score ranges map to model pools
tiers:
  free:
    scoreRange: [1, 3]
    models:
      - provider: groq
        model: llama-3.3-70b-versatile
      - provider: google
        model: gemini-2.5-flash
      - provider: together
        model: meta-llama/Llama-3.3-70B-Instruct-Turbo
      - provider: fireworks
        model: accounts/fireworks/models/llama-v3p3-70b-instruct

  economical:
    scoreRange: [4, 6]
    models:
      - provider: groq
        model: llama-3.3-70b-versatile
      - provider: moonshot
        model: kimi-latest
      - provider: deepseek
        model: deepseek-chat
      - provider: together
        model: deepseek-ai/DeepSeek-V3
      - provider: together
        model: Qwen/Qwen2.5-72B-Instruct-Turbo
      - provider: fireworks
        model: accounts/fireworks/models/deepseek-v3
      - provider: openai
        model: gpt-4o
      # - provider: mistral
      #   model: mistral-large-latest

  premium:
    scoreRange: [7, 8]
    models:
      - provider: anthropic
        model: claude-sonnet-4-20250514
      - provider: openai
        model: gpt-4o

  frontier:
    scoreRange: [9, 10]
    models:
      - provider: anthropic
        model: claude-opus-4-20250514
      - provider: anthropic
        model: claude-sonnet-4-20250514
      - provider: openai
        model: gpt-4o

# Provider configurations — API keys loaded from env vars
providers:
  anthropic:
    apiKeyEnv: ANTHROPIC_API_KEY
    timeoutMs: 30000
    healthCooldownMs: 60000
  google:
    apiKeyEnv: GOOGLE_AI_API_KEY
    timeoutMs: 30000
    healthCooldownMs: 60000
  openai:
    apiKeyEnv: OPENAI_API_KEY
    baseUrl: https://api.openai.com/v1
    timeoutMs: 30000
    healthCooldownMs: 60000
  deepseek:
    apiKeyEnv: DEEPSEEK_API_KEY
    baseUrl: https://api.deepseek.com/v1
    timeoutMs: 30000
    healthCooldownMs: 60000
  groq:
    apiKeyEnv: GROQ_API_KEY
    baseUrl: https://api.groq.com/openai/v1
    timeoutMs: 30000
    healthCooldownMs: 60000
  mistral:
    apiKeyEnv: MISTRAL_API_KEY
    baseUrl: https://api.mistral.ai/v1
    timeoutMs: 30000
    healthCooldownMs: 60000
  xai:
    apiKeyEnv: XAI_API_KEY
    baseUrl: https://api.x.ai/v1
    timeoutMs: 30000
    healthCooldownMs: 60000
  moonshot:
    apiKeyEnv: MOONSHOT_API_KEY
    baseUrl: https://api.moonshot.ai/v1
    timeoutMs: 30000
    healthCooldownMs: 60000
  together:
    apiKeyEnv: TOGETHER_API_KEY
    baseUrl: https://api.together.xyz/v1
    timeoutMs: 30000
    healthCooldownMs: 60000
  fireworks:
    apiKeyEnv: FIREWORKS_API_KEY
    baseUrl: https://api.fireworks.ai/inference/v1
    timeoutMs: 30000
    healthCooldownMs: 60000

# Model pricing — cost per million tokens (input/output)
# These override the hardcoded defaults in the cost calculator
#
# Free tier models: Groq and Google Gemini Flash are priced at $0 because
# their free API tiers cover Pharos usage at typical volumes.
# Groq is routing-only (classifier moved to Moonshot), so free tier lasts longer.
# Groq paid rate: $0.59/$0.79, Google paid rate: $0.30/$2.50 (standard API)
# If you exceed free tier limits, update these entries to reflect actual costs.
pricing:
  # ─── Free Tier ───
  - provider: google
    model: gemini-2.5-flash
    inputCostPerMillion: 0
    outputCostPerMillion: 0
  - provider: groq
    model: llama-3.3-70b-versatile
    inputCostPerMillion: 0
    outputCostPerMillion: 0
  # ─── Economical Tier ───
  - provider: deepseek
    model: deepseek-chat
    inputCostPerMillion: 0.14
    outputCostPerMillion: 0.28
  - provider: mistral
    model: mistral-large-latest
    inputCostPerMillion: 2.0
    outputCostPerMillion: 6.0
  # ─── Premium Tier ───
  - provider: anthropic
    model: claude-sonnet-4-20250514
    inputCostPerMillion: 3.0
    outputCostPerMillion: 15.0
  - provider: openai
    model: gpt-4o
    inputCostPerMillion: 2.5
    outputCostPerMillion: 10.0
  - provider: google
    model: gemini-2.5-pro
    inputCostPerMillion: 1.25
    outputCostPerMillion: 10.0
  # ─── Frontier Tier ───
  - provider: anthropic
    model: claude-opus-4-20250514
    inputCostPerMillion: 15.0
    outputCostPerMillion: 75.0
  - provider: openai
    model: o3
    inputCostPerMillion: 10.0
    outputCostPerMillion: 40.0
  # ─── Classifier (primary) / Economical ───
  - provider: moonshot
    model: kimi-latest
    inputCostPerMillion: 0.50
    outputCostPerMillion: 2.50
  - provider: xai
    model: grok-3-mini-fast
    inputCostPerMillion: 0.30
    outputCostPerMillion: 0.50
  # ─── Together AI ───
  - provider: together
    model: meta-llama/Llama-3.3-70B-Instruct-Turbo
    inputCostPerMillion: 0.88
    outputCostPerMillion: 0.88
  - provider: together
    model: deepseek-ai/DeepSeek-V3
    inputCostPerMillion: 0.50
    outputCostPerMillion: 0.90
  - provider: together
    model: Qwen/Qwen2.5-72B-Instruct-Turbo
    inputCostPerMillion: 0.60
    outputCostPerMillion: 0.60
  # ─── Fireworks AI ───
  - provider: fireworks
    model: accounts/fireworks/models/llama-v3p3-70b-instruct
    inputCostPerMillion: 0.90
    outputCostPerMillion: 0.90
  - provider: fireworks
    model: accounts/fireworks/models/deepseek-v3
    inputCostPerMillion: 0.50
    outputCostPerMillion: 1.40

# Spending limits — set to null (or omit) to disable
# Alerts fire at 80% and 100% of each limit
spending:
  dailyLimit: null
  monthlyLimit: null

# Cost tracking
tracking:
  enabled: true
  # Where to store the SQLite database
  dbPath: ./data/pharos.db
  # Baseline model for savings calculation
  baselineModel: claude-sonnet-4-20250514
  baselineCostPerMillionInput: 3.0
  baselineCostPerMillionOutput: 15.0
  # Purge tracking records older than this many days on startup
  retentionDays: 30

logging:
  level: info
  pretty: true
