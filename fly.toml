app = "pharos-nexlabs"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PHAROS_PORT = "3777"
  PHAROS_HOST = "0.0.0.0"
  PHAROS_LOG_LEVEL = "info"
  NODE_ENV = "production"

[http_service]
  internal_port = 3777
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/health"

[[mounts]]
  source = "pharos_data"
  destination = "/app/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
