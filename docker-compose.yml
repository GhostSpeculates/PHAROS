services:
  pharos:
    build: .
    ports:
      - "3777:3777"
    env_file:
      - .env
    environment:
      # Override host binding for Docker (default config uses 127.0.0.1)
      PHAROS_HOST: "0.0.0.0"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
